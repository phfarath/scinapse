name: SciNapse
options:
  bundleIdPrefix: com.phfarath
  deploymentTarget:
    iOS: "17.4"
packages:
  SciNapseKit:
    path: ../SciNapseKit
targets:
  SciNapse:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: SciNapseKit
      - target: SciNapseShare
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.phfarath.scinapse
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 78P7499NZ8
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    info:
      path: Sources/App/Info.plist
      properties:
        PublishSecret: "$(SCINAPSE_PUBLISH_SECRET)"
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
    entitlements:
      path: Sources/App/SciNapse.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.phfarath.scinapse
  SciNapseShare:
    type: app-extension
    platform: iOS
    sources: [ShareExtension]
    dependencies:
      - package: SciNapseKit
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.phfarath.scinapse.Share
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 78P7499NZ8
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: ShareExtension/SciNapseShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.phfarath.scinapse
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: SciNapse
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: 1
