name: SciNapse
options:
  bundleIdPrefix: com.phfarath
  deploymentTarget:
    iOS: "17.4"
packages:
  SciNapseKit:
    path: ../SciNapseKit
targets:
  SciNapse:
    type: application
    platform: iOS
    sources: [Sources]
    dependencies:
      - package: SciNapseKit
      - target: SciNapseShare
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.phfarath.scinapse
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: Sources/App/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.phfarath.scinapse
            CFBundleURLSchemes:
              - scinapse
  SciNapseShare:
    type: app-extension
    platform: iOS
    sources: [ShareExtension]
    settings:
      base:
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.phfarath.scinapse.Share
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: SciNapse
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: 1
